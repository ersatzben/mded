<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="github-markdown.css">
    <link rel="stylesheet" href="github-highlight.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="github-highlight-dark.css" media="(prefers-color-scheme: dark)">
    <style>
        body {
            margin: 0;
            padding: 16px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #0d1117; }
        }
        @media (prefers-color-scheme: light) {
            body { background-color: #ffffff; }
        }
        .markdown-body {
            max-width: 980px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <article class="markdown-body" id="content"></article>
    <script src="marked.min.js"></script>
    <script src="highlight.min.js"></script>
    <script>
        function render(text) {
            var content = document.getElementById('content');
            content.innerHTML = marked.parse(text || '');
            content.querySelectorAll('pre code').forEach(function(el) {
                hljs.highlightElement(el);
            });
        }
    </script>
</body>
</html>
